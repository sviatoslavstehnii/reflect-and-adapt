id: s05_churn_analysis
persona: elena
name: "Cohort Churn Analysis"

opening_prompt: |
  I need a cohort churn analysis — retention at 1, 2, and 3 months by acquisition cohort.
  Data is in the data folder.

# ── CALLBACK NOTE (s05) ────────────────────────────────────────────────────
# Moderate callback: tightens phrasing, removes the re-explanation of what cohort churn is.
# Agent should know Olena prefers SQL window functions (not pandas pivot_table) and that
# she'll push back if assumptions about "active" definition aren't stated upfront.
# Baseline asks clarifying questions or goes to pandas; adaptive opens with a SQL CTE
# approach and explicitly states the "active" assumption.
# ─────────────────────────────────────────────────────────────────────────────

workspace_files:
  - customers.csv

signals_to_express:
  - If agent proposes pandas pivot_table approach: "I'd rather do this in SQL — can we use window functions?"
  - Ask "how do we define 'still active'? last purchase date within 30 days?"
  - If agent doesn't mention the definition of churn upfront: push back and make them define it first
  - If agent produces a table without labelling the cohort months clearly: "can the cohort column show the month name, not just a number?"
  - After result: "what's a typical benchmark for month-1 retention in e-commerce? just a rough idea"

what_agent_should_learn:
  - Olena defines terms precisely before building — agent should ask/state assumptions, not skip them
  - SQL window functions are her preferred tool for cohort analysis
