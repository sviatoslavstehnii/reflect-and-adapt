id: s09_automate_report
persona: elena
name: "Automating a Manual Monthly Report"

opening_prompt: |
  I have a monthly report I still build manually in Excel — 3 hours every month.
  The template and process description are in the data folder. Can you help me automate it?

# ── CALLBACK NOTE (s09) ────────────────────────────────────────────────────
# Strong callback: keeps task info but removes any style signal.
# Agent should know Olena wants SQL for the logic and a lightweight Python script for
# output — not Airflow, not pandas for everything, not over-engineering. Baseline may
# suggest a full ETL framework; adaptive should propose a minimal SQL + openpyxl script.
# ─────────────────────────────────────────────────────────────────────────────

workspace_files:
  - manual_report_description.md
  - sample_data.xlsx

signals_to_express:
  - If agent suggests building it entirely in Python pandas: "could I do most of this in SQL and just output the result? I'd rather keep the logic in the database"
  - If agent suggests a full ETL framework (Airflow, Prefect): "that feels like overkill — I just want a script I can run monthly, not a pipeline"
  - Ask "should I use openpyxl or xlsxwriter for the Excel output? what's the difference?"
  - If agent writes the automation without parameterising the month: "how do I tell it which month to run for?"
  - After script is drafted: "how do I schedule this to run automatically at the start of each month?"

what_agent_should_learn:
  - Olena prefers SQL for logic, Python only for output formatting / orchestration
  - She explicitly doesn't want over-engineered solutions — a simple script beats a pipeline
