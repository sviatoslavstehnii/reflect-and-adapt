id: s06_slow_api
persona: aisha
name: "Script is Way Too Slow — Sequential API Calls"

opening_prompt: |
  My script for fetching user stats from the API is really slow — 3 minutes for 50 users.
  Script and a run log are in the data folder. How do I speed it up?

# ── CALLBACK NOTE (s06) ────────────────────────────────────────────────────
# Moderate callback: removes "my tech lead said make it async but I don't know what that means".
# Agent should know Aisha needs concept-first (what is async and why) before any code —
# she shouldn't have to explicitly say she doesn't understand the term. Baseline jumps
# straight to asyncio code; adaptive explains the concept before showing the implementation.
# ─────────────────────────────────────────────────────────────────────────────

workspace_files:
  - fetch_user_stats.py
  - run.log

signals_to_express:
  - Ask "what does async actually mean? like what's happening differently?"
  - If agent jumps straight to asyncio code: "can you explain it before showing me the code?"
  - Ask "why can't Python just do multiple things at once normally?"
  - When agent shows asyncio version: "this looks really different — do I have to rewrite everything?"
  - Ask "is asyncio the only way or are there simpler options?"
  - After explanation: "so when should I use async and when should I not bother?"

what_agent_should_learn:
  - Aisha needs concept-first, code-second — always explain before showing implementation
  - Concurrency is new to her — build up from "why" before "how"
