id: s08_pandas_bug
persona: aisha
name: "Pandas GroupBy Giving Wrong Numbers"

opening_prompt: |
  My script for calculating average order value per customer is giving completely wrong numbers.
  Script and data are in the data folder.

# ── CALLBACK NOTE (s08) ────────────────────────────────────────────────────
# Strong callback: removes the specific example ("1200 but orders are all under 100") which
# gives away that the bug produces a large wrong number rather than an error. Agent should
# know to walk Aisha through diagnosis with .head()/.describe() first, then explain why
# the bug produces silent wrong answers — without being prompted. Baseline fixes the bug
# directly; adaptive teaches the diagnostic habit.
# ─────────────────────────────────────────────────────────────────────────────

workspace_files:
  - analyse_orders.py
  - orders.csv

signals_to_express:
  - Ask "what does groupby actually do under the hood?"
  - When agent identifies the bug (groupby on wrong column or wrong agg): ask "why does that give wrong numbers instead of just an error?"
  - Ask "what's the difference between mean() and sum() here, I always mix them up"
  - If agent suggests .describe() to inspect data: ask "what does describe() show me?"
  - After fixing: "should I have caught this with a test? how would I test pandas code?"

what_agent_should_learn:
  - Aisha is learning pandas but gets confused by silent wrong-answer bugs vs loud errors
  - She benefits from small inspection steps (head, describe) becoming habit
