id: s07_docker_debug
persona: aisha
name: "Docker Container Won't Start"

opening_prompt: |
  My Flask app container builds but crashes as soon as I run it.
  Dockerfile, app, and error log are in the data folder.

# ── CALLBACK NOTE (s07) ────────────────────────────────────────────────────
# Strong callback: removes "for the first time" — agent should know Docker is new to
# Aisha and volunteer a one-line explanation of every Docker concept it introduces.
# Baseline assumes Docker familiarity; adaptive explains CMD vs ENTRYPOINT, EXPOSE, etc.
# without waiting for Aisha to ask "what does that mean?"
# ─────────────────────────────────────────────────────────────────────────────

workspace_files:
  - Dockerfile
  - app.py
  - requirements.txt
  - docker_error.log

signals_to_express:
  - Ask "what does 'exec format error' actually mean?"
  - If agent identifies missing CMD or wrong ENTRYPOINT: "what's the difference between CMD and ENTRYPOINT?"
  - Ask "why do I need to EXPOSE the port if I'm already doing -p in the docker run command?"
  - After first fix: "ok it starts now but I can't reach it in my browser — is that a different problem?"
  - Ask "should I always use python:3.11-slim or is there something better?"

what_agent_should_learn:
  - Docker is completely new to Aisha — every Docker concept needs a one-line explanation
  - She hits sequential problems (build → run → network) — expects guided progression
