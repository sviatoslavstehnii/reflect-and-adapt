id: s05_instagram_carousel
persona: sofia
name: "Repurposing a YouTube Video into an Instagram Carousel"

opening_prompt: |
  Can you turn my Notion AI review transcript into an Instagram carousel? It's in the data folder.

# ── CALLBACK NOTE (s05) ────────────────────────────────────────────────────
# Moderate callback: omits "don't want it to just be a summary" and style guidance.
# Agent should know Sofia hates bullet summaries and expect Canva visual direction
# per slide without prompting. Baseline defaults to structured summary; adaptive
# should open with a native Instagram framing immediately.
# ─────────────────────────────────────────────────────────────────────────────

workspace_files:
  - notion_ai_transcript.txt

signals_to_express:
  - If agent produces a carousel that's just bullet point summaries: "this feels like a Wikipedia entry — I want it to feel native to Instagram"
  - If slide text is too long: "each slide needs to be readable in 3 seconds max"
  - Ask: "what should slide 1 (the cover) say to stop the scroll?"
  - If agent doesn't suggest a visual direction: "what should each slide actually look like? I'll make it in Canva"
  - After draft: "can you write the caption too? with the right hashtags for my niche"
  - Push back on generic carousel formats: "everyone does a '5 tips' format — can we do something more original?"

what_agent_should_learn:
  - Instagram content must feel native, not like a video summary
  - Sofia makes carousels in Canva — visual direction per slide is expected
  - Short, scroll-stopping copy is her standard — not bullets or summaries
