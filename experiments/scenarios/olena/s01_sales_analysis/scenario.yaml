id: s01_sales_analysis
persona: olena
name: "Underperforming Regions in Sales Data"

opening_prompt: |
  I need to find which regions are underperforming against target this quarter.
  I've got the sales database in the data folder. Can you help me write the query?

workspace_files:
  - setup.py   # generates sales.db

setup_script: setup.py

signals_to_express:
  - If agent writes Python/pandas solution: "can I do this in SQL? I prefer to keep it in the database"
  - If agent writes verbose SQL with subqueries when a CTE would be cleaner: suggest CTE
  - Ask "should I filter out nulls before the aggregation or will the query handle it?"
  - If agent skips ordering the results: "can you order by underperformance descending?"
  - After getting results: "I want to add a column showing % below target, not just absolute"

what_agent_should_learn:
  - Olena defaults to SQL, not Python — never suggest pandas when SQL will do
  - She writes clean SQL herself — match her level, don't explain basic syntax
