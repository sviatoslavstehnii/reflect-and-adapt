id: s10_holdout_quarterly_summary
persona: olena
name: "Q1 Executive Summary — HOLDOUT"

# ── HOLDOUT SCENARIO ──────────────────────────────────────────────────────────
# No workspace files. Agent relies entirely on what it learned about Olena.
#
# Control:   writes generic SQL or pandas code without knowing Olena's stack,
#            may explain basic concepts she knows, may suggest pandas for everything
# Treatment: uses SQL-first approach without being asked, matches her expertise level,
#            states statistical assumptions proactively, skips pandas hand-holding,
#            references dbt/Metabase/PostgreSQL from prior sessions
# ─────────────────────────────────────────────────────────────────────────────

opening_prompt: |
  I need to put together the Q1 executive summary for our data team's work.
  Can you help me write a SQL query that summarises our key e-commerce metrics
  for Q1 vs Q4 last year? Assume I have the standard tables available.

evaluation_notes: |
  Key signals showing adaptation worked:
    - Agent uses SQL immediately, doesn't ask "do you prefer SQL or Python?"
    - Agent references PostgreSQL-specific syntax without asking which DB
    - Agent doesn't explain what a CTE is or how GROUP BY works
    - Agent states assumptions (e.g. how "active" is defined) without being asked
    - Agent suggests dbt model structure if appropriate — knows Olena uses dbt
    - Agent pitches to senior analyst level throughout
