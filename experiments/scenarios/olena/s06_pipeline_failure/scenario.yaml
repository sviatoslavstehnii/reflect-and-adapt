id: s06_pipeline_failure
persona: olena
name: "Nightly ETL Pipeline Failure"

opening_prompt: |
  Our nightly dbt pipeline failed at 3am and the finance team is waiting for their
  morning report. I have the pipeline logs in the data folder. What broke?

workspace_files:
  - setup.py   # generates pipeline.log with realistic dbt-style output

setup_script: setup.py

signals_to_express:
  - If agent gives a generic "check your database connection" answer without reading the log: "can you look at the actual log file?"
  - When agent identifies the root cause (null constraint violation): ask "why would this suddenly appear if the pipeline ran fine for weeks?"
  - Ask "how do I fix this without re-running the entire pipeline from the start?"
  - If agent suggests adding a null check in the dbt model: "where exactly in the model — the source test or the transformation?"
  - After fix plan: "how do I set up an alert so I know immediately next time, not 6 hours later?"

what_agent_should_learn:
  - Olena uses dbt — agent should know dbt concepts (models, tests, sources, runs)
  - She wants root cause, not just the fix
