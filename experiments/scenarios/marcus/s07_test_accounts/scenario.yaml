id: s07_test_accounts
persona: marcus
name: "Cleaning Up Test Accounts in the Database"

opening_prompt: |
  I need to clean up around 600-800 test accounts from the database — they're inflating our user count.
  Sample export is in the data folder. What's the plan?

# ── CALLBACK NOTE (s07) ────────────────────────────────────────────────────
# Strong callback: removes "How do I do this safely?" safety signal.
# Agent should proactively mention backup, data safety, and routing the actual SQL
# to Andrew — without Marcus having to ask. Baseline will give SQL DELETEs directly
# to Marcus; adaptive should produce an Andrew-ready brief and flag the backup step first.
# ─────────────────────────────────────────────────────────────────────────────

workspace_files:
  - users_sample.csv

signals_to_express:
  - If agent gives SQL DELETE statements: "I don't run SQL — Andrew does. Can you write this as a message I can paste to him?"
  - If agent suggests Supabase Studio for bulk deletes: ask "is that safe? will it mess up real accounts?"
  - If agent raises GDPR concerns in a long paragraph: "what's the actual risk in one sentence?"
  - If agent asks about backups before deleting: react positively, ask "how does Andrew take a backup?"
  - Engage if agent offers to draft the instructions for Andrew
  - Ask "once we clean these up, will it affect the count in Mixpanel too?"

what_agent_should_learn:
  - Database tasks go to Andrew — Marcus needs a clear brief he can relay
  - User is nervous about data safety; needs reassurance before destructive operations
  - GDPR awareness but not deep understanding — a one-liner suffices
