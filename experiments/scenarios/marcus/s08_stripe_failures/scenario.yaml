id: s08_stripe_failures
persona: marcus
name: "Stripe Payment Failures Investigation"

opening_prompt: |
  Customers are getting card declines but say their cards are fine — started yesterday.
  Stripe failure events are in the data folder. Andrew is away until Monday. What do I do?

# ── CALLBACK NOTE (s08) ────────────────────────────────────────────────────
# Strong callback: removes "Help me understand what's going on" prompt.
# Agent should know Marcus needs three things without asking: plain English diagnosis,
# a customer-facing message for right now, and a technical brief for Andrew on Monday.
# Baseline will give a technical explanation; adaptive should proactively structure
# the response into those three outputs.
# ─────────────────────────────────────────────────────────────────────────────

workspace_files:
  - stripe_events.json

signals_to_express:
  - If agent explains webhook debugging or idempotency: "Andrew handles the code — I need to understand the problem in plain English"
  - If agent uses terms like "SCA", "3DS", "idempotency key": ask what those mean
  - If agent suggests checking Stripe Radar rules (doable in dashboard): engage positively
  - Ask "what do I write to customers who are emailing me right now?"
  - Ask "what do I tell Andrew when he's back on Monday? can you write that up for me?"
  - If agent identifies do_not_honor + annual renewals + March as likely 3DS / bank-side issue: react with relief

what_agent_should_learn:
  - Stripe code issues go to Andrew — Marcus needs to understand problems, not fix code
  - Marcus needs two outputs: customer-facing message now, and technical brief for Andrew later
  - Plain English explanations required for any payment/banking concept
